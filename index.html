<!doctype html>
<html>
<head>
    <title><%= productName %></title>

    <meta charset="utf-8" />
    <meta name="description" content="<%= productDescription %>" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="msapplication-tap-highlight" content="no" />
    <meta
        name="viewport"
        content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width<% if (ctx.mode.cordova || ctx.mode.capacitor) { %>, viewport-fit=cover<% } %>"
    />
    <link rel="icon" type="image/ico" href="favicon.ico" />
    <link rel="preload" as="font" href="src/assets/fonts/magiccardsnormal-webfont.woff2" type="font/woff2" crossorigin>
    <link rel="preload" as="font" href="src/assets/fonts/oblivion-font-webfont.woff2" type="font/woff2" crossorigin>
    <link rel="preload" as="font" href="src/assets/fonts/trajanusbricks-webfont.woff2" type="font/woff2" crossorigin>
    <link rel="preload" as="image" href="src/assets/images/common/bg-common.avif" type="image/avif">

    <style>
      html {
        background-color: #100F0D;
        transition: background-color 1500ms ease-in-out;
      }
    </style>
</head>

<body>
<!-- quasar:entry-point -->
</body>
</html>
